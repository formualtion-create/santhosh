<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline · PawsPair</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F7F7FB;color:#3A3656;font-family:system-ui,-apple-system,"DM Sans",sans-serif;text-align:center;padding:24px}
  .card{background:#fff;border-radius:24px;box-shadow:0 14px 32px rgba(40,36,79,.1);padding:36px;max-width:380px}
  .ico{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,#818CF8,#6366F1);display:grid;place-items:center;margin:0 auto 16px}
  h1{font-family:"Nunito",system-ui,sans-serif;color:#28244F;margin:0 0 8px}
  p{color:#6B6880;margin:0 0 18px}
  a{display:inline-block;background:linear-gradient(135deg,#818CF8,#6366F1);color:#fff;font-weight:800;text-decoration:none;padding:12px 24px;border-radius:999px}
</style>
</head>
<body>
  <div class="card">
    <div class="ico"><svg viewBox="0 0 24 24" width="36" height="36" fill="#fff"><circle cx="6" cy="10" r="1.9"/><circle cx="18" cy="10" r="1.9"/><circle cx="9.5" cy="6.5" r="1.9"/><circle cx="14.5" cy="6.5" r="1.9"/><path d="M12 12.5c-2.6 0-4.7 1.8-4.7 4 0 1.9 2.1 2.5 4.7 2.5s4.7-.6 4.7-2.5c0-2.2-2.1-4-4.7-4z"/></svg></div>
    <h1>You're offline 🐾</h1>
    <p>PawsPair needs a connection to fetch fresh matches. Check your network and try again.</p>
    <a href="/dashboard">Retry</a>
  </div>
</body>
</html>
